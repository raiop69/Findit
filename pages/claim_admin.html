<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Claims - FINDIT</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="items-body">
    <div class="container">
        <header class="header glass">
            <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
            <div class="logo">
                <i class="fas fa-search"></i>
                <h3>FINDIT</h3>
            </div>
            <div class="user-info">
                <span id="claimsUserName">User</span>
            </div>
        </header>

        <div class="items-header">
            <h1>My Claims</h1>
            <p>Track the status of your claim requests</p>
        </div>

        <div class="admin-stats" style="margin-bottom: 40px;">
            <div class="stat-card glass">
                <h3>Total Claims</h3>
                <span id="userTotalClaims" class="stat-number">0</span>
            </div>
            <div class="stat-card glass">
                <h3>Pending</h3>
                <span id="userPendingClaims" class="stat-number">0</span>
            </div>
            <div class="stat-card glass">
                <h3>Verified</h3>
                <span id="userVerifiedClaims" class="stat-number">0</span>
            </div>
        </div>

        <div class="claims-grid" id="userClaimsGrid">
            <!-- User claims will be populated here -->
        </div>
    </div>
    <script src="../script.js"></script>
</body>
</html>
